name: route
version: 0.1.0
runtime: ./route
capabilities:
  - tools
  - commands
  - messageHooks
defaults:
  - src: defaults/config.yaml
    dest: extensions/route/config.yaml
  - src: defaults/intents.yaml
    dest: extensions/route/intents.yaml
  - src: defaults/domains.yaml
    dest: extensions/route/domains.yaml
