name: webfetch
version: 0.1.0
runtime: ./webfetch
capabilities:
  - tools
  - promptSections
defaults:
  - src: cmd/defaults/prompt.md
    dest: extensions/webfetch/prompt.md
  - src: defaults/fetch-prompt.txt
    dest: extensions/webfetch/fetch-prompt.txt
  - src: defaults/search-prompt.txt
    dest: extensions/webfetch/search-prompt.txt
  - src: defaults/gemini-fetch-prompt.txt
    dest: extensions/webfetch/gemini-fetch-prompt.txt
  - src: defaults/gemini-search-prompt.txt
    dest: extensions/webfetch/gemini-search-prompt.txt
