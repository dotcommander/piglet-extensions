name: background
version: 0.2.0
description: Run read-only background tasks with /bg and cancel them with /bg-cancel
runtime: ./background
intents:
  - background
  - bg
triggers:
  - /bg
  - /bg-cancel
  - /bg-stop
  - /cancel
  - background task
  - run in background
capabilities:
  - commands
  - tools
